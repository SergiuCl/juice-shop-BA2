name: "ZAP Full Scan (Action)"

on:
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'ZAP scan type'
        required: true
        default: 'full'
        type: choice
        options:
          - baseline
          - full

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: ZAP scan of local Juice Shop
    timeout-minutes: 120

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build and start Juice Shop
        run: |
          npm start &
          echo "Juice Shop starting in background..."

      - name: Wait for Juice Shop to be ready
        run: |
          echo "Waiting for Juice Shop on http://localhost:3000/"
          TIMEOUT=120
          INTERVAL=5
          elapsed=0
          while [ $elapsed -lt $TIMEOUT ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ 2>/dev/null || echo "000")
            if echo "$HTTP_CODE" | grep -qE "^(200|301|302|303)$"; then
              echo "Juice Shop is ready! (HTTP $HTTP_CODE) after ${elapsed}s"
              exit 0
            fi
            echo "Waiting... ($elapsed/${TIMEOUT}s) - HTTP $HTTP_CODE"
            sleep $INTERVAL
            elapsed=$((elapsed + INTERVAL))
          done
          echo "ERROR: Juice Shop did not start within ${TIMEOUT}s"
          exit 1

      - name: ZAP Baseline Scan
        if: inputs.scan_type == 'baseline'
        uses: zaproxy/action-baseline@v0.14.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j'
          allow_issue_writing: false

      - name: ZAP Full Scan
        if: inputs.scan_type == 'full'
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j'
          allow_issue_writing: false

      - name: Upload ZAP reports
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: zap-action-reports
          path: |
            report_html.html
            report_json.json
            report_md.md
