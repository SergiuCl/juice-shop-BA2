name: "CodeQL"

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended, security-experimental, security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      - name: Rename SARIF for upload
        run: |
          mkdir -p sarif-output
          cp ${{ runner.workspace }}/results/*.sarif sarif-output/ 2>/dev/null || true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v6
        with:
          name: codeql-${{ matrix.language }}-sarif
          path: sarif-output/
